<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MindCount</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

<!-- NOTE: keep your theme.js loaded at end so pages sync with theme -->
<style>
/* =====================================================================
   MindCraft — Account Page (Upgraded hybrid: retro visual + robust JS)
   ===================================================================== */

/* ---------- Reset & Globals ---------- */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html,body { height: 100%; width: 100%; font-family: 'Press Start 2P', cursive; }

/* ---------- Page background (non-repeating) ---------- */
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg,#8b6f47 0%, #a0ecff 45%, #c8f7b0 100%);
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: cover;
  color: #3b2e16;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ---------- Top bar (XP + level + nav) ---------- */
.top-bar {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: linear-gradient(to bottom, #8b6f47 0%, #6b5636 100%);
  border-bottom: 3px solid #5a4a30;
  box-shadow: 0 8px 18px rgba(0,0,0,0.25);
  z-index: 30;
}

/* XP display left */
.xp-display {
  display:flex;
  align-items:center;
  gap:10px;
  flex: 0 0 auto;
  color: #f4e4c1;
  font-size: 0.65rem;
}
.xp-label { font-weight:700; letter-spacing:1px; }

/* XP bar */
.xp-bar-outer {
  width: 150px;
  height: 18px;
  border-radius: 6px;
  background: #3d2f1f;
  border: 2px solid #f4e4c1;
  overflow: hidden;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.45);
}
.xp-bar-inner {
  height:100%;
  width:0%;
  background: linear-gradient(90deg,#1db954 0%, #ffd700 100%);
  transition: width 600ms cubic-bezier(.2,.9,.2,1), background 400ms ease;
}

/* XP numbers */
.xp-numbers { font-weight:700; color:#f4e4c1; font-size:0.65rem; min-width:90px; text-align:right; }

/* middle area: level info */
.level-holder { flex: 1 1 auto; display:flex; justify-content:center; align-items:center; gap:10px; }
.level-pill {
  background: linear-gradient(0deg,#2b2017,#5d4a37);
  color: #f4e4c1;
  padding: 8px 14px;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.06);
  box-shadow: 0 6px 0 rgba(0,0,0,0.2);
  font-size: 0.65rem;
  text-transform:uppercase;
  letter-spacing:1px;
}

/* nav buttons right */
.nav-buttons { display:flex; gap:10px; align-items:center; justify-content:flex-end; }
.nav-btn {
  padding: 9px 14px;
  border-radius: 8px;
  background: linear-gradient(to bottom,#d4a574,#b8945a);
  border: 2px solid #f4e4c1;
  color: #2b2017;
  cursor:pointer;
  font-family: 'Press Start 2P', cursive;
  font-size: 0.55rem;
  box-shadow: 0 6px 0 #6b5636, inset 0 1px 0 rgba(255,255,255,0.25);
  transition: transform .12s ease, box-shadow .12s ease;
  white-space:nowrap;
}
.nav-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #6b5636; }
.nav-btn:hover { transform: translateY(-2px); }

/* ---------- Content region ---------- */
.content {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding: 36px 16px 100px;
}

/* ---------- Account card ---------- */
.account-card {
  width:100%;
  max-width:720px;
  border-radius:14px;
  padding:28px;
  background: linear-gradient(135deg,#e8f4ff 0%, #e8fff8 100%);
  box-shadow: 0 18px 50px rgba(0,0,0,0.28);
  border: 3px solid #8b9dc3;
  text-align:center;
  position:relative;
  overflow:visible;
}

/* animated subtle badge */
.role-badge {
  position:absolute;
  top:-18px;
  left:18px;
  background:#1DB954;
  color:#fff;
  font-weight:700;
  padding:6px 10px;
  border-radius:8px;
  border:2px solid rgba(255,255,255,0.15);
  box-shadow: 0 6px 0 rgba(0,0,0,0.25);
  font-size:0.55rem;
}

/* heading */
.account-card h1 {
  margin-bottom:16px;
  color:#5a3a1a;
  font-size:0.95rem;
  letter-spacing:2px;
  text-shadow: 0 2px 4px rgba(255,255,255,0.5);
}

/* info rows */
.info-row {
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
  margin:10px 0;
  padding:12px;
  background: rgba(255,255,255,0.7);
  border-radius:8px;
  border: 1px solid rgba(0,0,0,0.06);
}
.info-label { color:#5a3a1a; font-size:0.65rem; font-weight:700; letter-spacing:1px; }
.info-value { color:#3b2e16; font-weight:800; font-size:0.85rem; }

/* rank panel */
.rank-panel {
  margin-top:14px;
  background: linear-gradient(90deg,#ffeaa7,#fff9e6);
  padding:14px;
  border-radius:8px;
  border:2px solid #c18f00;
  color:#5a3a1a;
  font-weight:700;
  letter-spacing:1px;
}

/* footer fixed */
.page-footer {
  width:100%;
  text-align:center;
  padding:12px 8px;
  background: linear-gradient(to top,#6b5636,#8b6f47);
  color:#f4e4c1;
  box-shadow: 0 -6px 14px rgba(0,0,0,0.25);
  font-size:0.55rem;
  position:fixed;
  bottom:0;
  left:0;
  z-index:25;
  border-top:2px solid #5a4a30;
}

/* small screen tweaks */
@media (max-width:860px) {
  .xp-bar-outer { width: 120px; }
  .xp-numbers { min-width:70px; font-size:0.58rem; }
  .nav-btn { font-size:0.5rem; padding:8px 12px; }
  .account-card { padding:18px; }
}
@media (max-width:520px) {
  .top-bar { flex-direction:column; gap:10px; align-items:stretch; padding:12px; }
  .level-holder { justify-content:center; }
  .xp-display { justify-content:center; }
  .nav-buttons { justify-content:center; }
  .xp-bar-outer { width: 100px; }
  .account-card { max-width: 92%; padding:16px; }
}

body.theme-dark .account-card h1,
body.theme-dark #rankTitle,
body.theme-dark .rank-panel {
  color: #f7ead7 !important;
  text-shadow: none;
}

body.theme-dark #rankTitle {
  color: #f7ead7 !important;
  font-weight: 800;
}   
   
/* decorative floating particles (subtle) */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index:0;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 6px; height:6px;
  background: rgba(255,255,255,0.12);
  border-radius:50%;
  filter: blur(.2px);
  animation: floatUp linear infinite;
  opacity: 0.6;
}
@keyframes floatUp {
  from { transform: translateY(30vh) scale(.8); opacity:0; }
  10% { opacity:0.35; }
  50% { opacity:0.9; }
  to { transform: translateY(-20vh) scale(1.1); opacity:0; }
}

/* small helper classes */
.hidden { display:none !important; }
.center { display:flex; align-items:center; justify-content:center; gap:10px; }
</style>
</head>
<body>

<!-- Floating particle layer -->
<div id="particleLayer" class="particles" aria-hidden="true"></div>

<!-- Top bar -->
<div class="top-bar" role="banner" aria-label="top navigation and status">
  <div class="xp-display" aria-hidden="false">
    <div class="xp-label">XP</div>
    <div class="xp-bar-outer" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div id="xpBarInner" class="xp-bar-inner"></div>
    </div>
    <div id="xpNumbers" class="xp-numbers">0 / 100</div>
  </div>

  <div class="level-holder" aria-live="polite">
    <div class="level-pill" id="levelPill">LEVEL 1</div>
  </div>

  <div class="nav-buttons" role="navigation" aria-label="page navigation">
    <button class="nav-btn" id="navHome">🏠 Home</button>
    <button class="nav-btn" id="leaderboardBtn">📊 Leaderboard</button>
    <button class="nav-btn" id="navSettings">⚙️ Settings</button>
    <button class="nav-btn" id="navLogout" style="background:#ff6b6b;border-color:#ffb3b3;">🚪 Logout</button>
  </div>
</div>

<!-- Main content -->
<div class="content">
  <div class="account-card" role="main" aria-labelledby="accountHeading">
    <div class="role-badge" id="roleBadge">STUDENT</div>
    <h1 id="accountHeading">👤 ACCOUNT INFORMATION</h1>

    <div class="info-row">
      <div class="info-label">USERNAME</div>
      <div class="info-value" id="username">Loading...</div>
    </div>

    <div class="info-row">
      <div class="info-label">LEVEL</div>
      <div class="info-value" id="level">1</div>
    </div>

    <div class="info-row">
      <div class="info-label">TOTAL XP</div>
      <div class="info-value" id="totalXP">0</div>
    </div>

    <div class="info-row">
      <div class="info-label">LAST LOGIN</div>
      <div class="info-value" id="lastLogin">—</div>
    </div>

    <div class="rank-panel" id="rankPanel">🏅 Rank: <span id="rankTitle">Beginner</span></div>
  </div>
</div>

<!-- Footer -->
<div class="page-footer">© 2025 MindCraft | Created by Kuya AJ & Team</div>

<!-- ===========================
     JavaScript: Firebase + UI
     =========================== -->
<script type="module">
/* eslint-disable no-console */
/*
  Upgraded Account page JS
  - Integrates with Firebase (auth + firestore)
  - Smooth XP animation using requestAnimationFrame
  - Auto-repair missing Firestore fields
  - Theme compatibility via window.setTheme (if provided)
  - Particle decoration generator (small, perf-friendly)
*/

/* ---------- Imports (keep same relative path) ---------- */
import { auth, db } from "../System/Database/firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, getDoc, updateDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ---------- Optional level data helpers (your existing modules) ---------- */
import { getStudentLevelData } from "../Exp/student-LV.js";
import { getTeacherLevelData } from "../Exp/teacher-LV.js";

/* ---------- UI refs ---------- */
const xpBarInner = document.getElementById("xpBarInner");
const xpNumbers = document.getElementById("xpNumbers");
const levelPill = document.getElementById("levelPill");
const usernameEl = document.getElementById("username");
const levelEl = document.getElementById("level");
const totalXPEl = document.getElementById("totalXP");
const lastLoginEl = document.getElementById("lastLogin");
const rankTitleEl = document.getElementById("rankTitle");
const roleBadge = document.getElementById("roleBadge");

const navHome = document.getElementById("navHome");
const navLeaderboard = document.getElementById("navLeaderboard");
const navSettings = document.getElementById("navSettings");
const navLogout = document.getElementById("navLogout");

const particleLayer = document.getElementById("particleLayer");

/* ---------- Local helpers ---------- */
function formatShort(n) {
  // small compact formatter for UI (similar to other helpers)
  if (typeof n !== "number") n = Number(n) || 0;
  if (n >= 1e12) return (n/1e12).toFixed(2)+"T";
  if (n >= 1e9) return (n/1e9).toFixed(2)+"B";
  if (n >= 1e6) return (n/1e6).toFixed(2)+"M";
  if (n >= 1e3) return (n/1e3).toFixed(2)+"K";
  return String(n);
}
function normalizeDateValue(v) {
  if (!v) return null;
  if (typeof v.toDate === "function") return v.toDate();
  if (typeof v.toMillis === "function") return new Date(v.toMillis());
  if (typeof v === "object" && Number.isFinite(v.seconds)) {
    const nanos = Number.isFinite(v.nanoseconds) ? v.nanoseconds : 0;
    return new Date((v.seconds * 1000) + Math.floor(nanos / 1_000_000));
  }
  if (typeof v === "number" && Number.isFinite(v)) {
    return new Date(v < 1e12 ? v * 1000 : v);
  }
  const dt = new Date(v);
  return Number.isNaN(dt.getTime()) ? null : dt;
}

function formatFullDate(d) {
  const dt = normalizeDateValue(d);
  return dt ? dt.toLocaleString() : "—";

/* ---------- Smooth animate XP bar ----------
   We animate from previous value to new value with requestAnimationFrame.
*/
let xpAnimation = null;
let xpAnimationState = { from:0, to:0, start:0, duration:600 };

function animateXP(fromVal, toVal, maxVal=100) {
  cancelAnimationFrame(xpAnimation);
  xpAnimationState = { from: fromVal, to: toVal, start: performance.now(), duration: 600, maxVal };
  function tick(now) {
    const t = Math.min((now - xpAnimationState.start) / xpAnimationState.duration, 1);
    // easeOutCubic
    const ease = 1 - Math.pow(1 - t, 3);
    const cur = xpAnimationState.from + (xpAnimationState.to - xpAnimationState.from) * ease;
    const percent = Math.max(0, Math.min(100, (cur / xpAnimationState.maxVal) * 100));
    xpBarInner.style.width = percent + "%";
    // change gradient based on percent
    if (percent >= 95) {
      xpBarInner.style.background = "linear-gradient(90deg,#ffd700,#ffb84d)";
    } else if (percent >= 50) {
      xpBarInner.style.background = "linear-gradient(90deg,#1db954,#ffd700)";
    } else {
      xpBarInner.style.background = "linear-gradient(90deg,#1db954,#4ae88f)";
    }
    xpNumbers.textContent = `${formatShort(Math.round(cur))} / ${formatShort(xpAnimationState.maxVal)}`;
    if (t < 1) xpAnimation = requestAnimationFrame(tick);
  }
  xpAnimation = requestAnimationFrame(tick);
}

/* ---------- Firestore repair: ensure user doc has necessary fields ---------- */
async function ensureUserDoc(user) {
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  const defaults = {
    name: user.displayName || (user.email ? user.email.split("@")[0] : "Unknown"),
    email: user.email || "",
    role: "student",
    verified: user.emailVerified || false,
    level: 1,
    xp: 0,
    xpMax: 100,
    totalXP: 0,
    completedLessons: [],
    completedQuizzes: [],
    createdAt: new Date()
  };
  if (!snap.exists()) {
    await setDoc(ref, defaults);
    return { ...defaults, id: user.uid };
  }
  const data = snap.data();
  const merged = { ...defaults, ...data };
  // If any keys missing, merge back
  let needsMerge = false;
  for (const k in defaults) if (!(k in data)) needsMerge = true;
  if (needsMerge) await setDoc(ref, merged, { merge: true });
  return merged;
}

/* ---------- Auth state listener ---------- */
let lastKnownXP = 0, lastKnownLevel = 1;
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    // not signed in, redirect to signin
    window.location.href = "../Account/signin.html";
    return;
  }

  try {
    // ensure doc exists and has expected fields
    const data = await ensureUserDoc(user);

    // update UI
    usernameEl.textContent = data.name || (user.email ? user.email.split("@")[0] : "Guest");
    levelEl.textContent = (data.level || 1);
    levelPill.textContent = `LEVEL ${data.level || 1}`;
    totalXPEl.textContent = formatShort(data.totalXP || data.xp || 0);
    lastLoginEl.textContent = formatFullDate(data.lastLogin || data.timestamp || data.lastSeen || user.metadata?.lastSignInTime || new Date());
    roleBadge.textContent = ((data.role || "student").toUpperCase());

    // rank title using your helper modules
    try {
      const rankInfo = data.role === "teacher" ? getTeacherLevelData(data.xp || 0) : getStudentLevelData(data.xp || 0);
      rankTitleEl.textContent = rankInfo && rankInfo.title ? rankInfo.title : "Beginner";
    } catch(e) {
      rankTitleEl.textContent = "Beginner";
      console.warn("rank helper error", e);
    }

    // animate xp from lastKnownXP -> new xp
    const xpNow = Number(data.xp || 0);
    const xpMax = Number(data.xpMax || 100);
    animateXP(lastKnownXP, xpNow, xpMax);
    lastKnownXP = xpNow;
    lastKnownLevel = data.level || 1;

    // Write a lastSeen/lastLogin stamp (non-critical)
    try {
      await updateDoc(doc(db,"users",user.uid), { lastSeen: serverTimestamp(), timestamp: serverTimestamp(), isActive: true });
    } catch(e) { /* ignore non-critical */ }

   const markActive = async () => {
      try {
        const current = auth.currentUser;
        if (!current) return;
        await updateDoc(doc(db, "users", current.uid), { lastSeen: new Date(), isActive: true });
      } catch (_) { }
    };

   const markInactive = async () => {
      try {
        const current = auth.currentUser;
        if (!current) return;
        await updateDoc(doc(db, "users", current.uid), { lastSeen: new Date(), isActive: false });
      } catch (_) { }
    };

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") markActive();
      else markInactive();
    });

    window.addEventListener("beforeunload", () => { markInactive(); });
    const activityInterval = setInterval(markActive, 60000);
    window.addEventListener("beforeunload", () => clearInterval(activityInterval));

  } catch (err) {
    console.error("Account load error:", err);
  }
});

/* ---------- Navigation event wiring ---------- */
navHome.addEventListener("click", async () => {
  // decide target based on role saved in Firestore or localStorage
  const uid = (auth.currentUser && auth.currentUser.uid) || localStorage.getItem("currentUser");
  if (!uid) { window.location.href = "../Account/signin.html"; return; }
  try {
    const snap = await getDoc(doc(db,"users",uid));
    const role = snap.exists() ? (snap.data().role || "student") : (localStorage.getItem("currentRole") || "student");
    const redirect = role === "teacher" ? "../Webside/Teacher.html" : "../Webside/Student.html";
    window.location.href = redirect;
  } catch(e) {
    console.error(e);
    window.location.href = "../Webside/Student.html";
  }
});

  try {
    // Remove any existing leaderboard container if open
    const old = document.getElementById("leaderboardOverlay");
    if (old) old.remove();

    // Create a container where the leaderboard.js can inject its UI
    const container = document.createElement("div");
    container.id = "leaderboardOverlay";
    document.body.appendChild(container);

    // Dynamically load leaderboard module
    await import("../Feature/SLeaderboard/leaderboard.js");
    console.log("✅ Leaderboard module loaded successfully");
  } catch (err) {
    console.error("⚠️ Failed to load leaderboard module:", err);
    alert("Leaderboard failed to load. Please try again.");
  }
});*/

navSettings.addEventListener("click", () => {
  window.location.href = "../Settings/setting.html";
});

navLogout.addEventListener("click", async () => {
  try {
    await signOut(auth);
    localStorage.removeItem("cachedName");
    localStorage.removeItem("currentRole");
    window.location.href = "../Account/signin.html";
  } catch(e) {
    console.error("Logout failed:", e);
  }
});

/* ---------- Particle generator (lightweight) ---------- */
function spawnParticles(count = 18) {
  particleLayer.innerHTML = "";
  const h = window.innerHeight, w = window.innerWidth;
  for (let i=0;i<count;i++){
    const el = document.createElement("div");
    el.className = "particle";
    const left = Math.random()*w;
    const top = h * (0.55 + Math.random()*0.4); // start lower to float up
    el.style.left = left + "px";
    el.style.top = top + "px";
    // duration vary
    const dur = 8000 + Math.random()*8000;
    el.style.animationDuration = dur + "ms";
    el.style.opacity = (0.15 + Math.random()*0.6).toFixed(2);
    el.style.transform = `scale(${0.6 + Math.random()*0.9})`;
    particleLayer.appendChild(el);
  }
}
spawnParticles();

/* regenerate on resize but throttled */
let resizeTimeout = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => spawnParticles(18),200);
});

/* ---------- Theme integration (if theme.js present) ---------- */
if (typeof window.setTheme === "function") {
  // Ensure the page respects saved theme on load
  const saved = localStorage.getItem("theme");
  if (saved) {
    // theme.js will style containers/buttons automatically,
    // but we also might adjust XP-bar colors slightly:
    if (saved === "dark") {
      // darker XP track
      document.querySelectorAll(".xp-bar-outer").forEach(n=>n.style.background="#202520");
    }
  }
}

/* ---------- End of module ---------- */
</script>

<!-- keep your theme script for sync (only if project uses it) -->
<script src="../Design/theme.js"></script>
</body>
