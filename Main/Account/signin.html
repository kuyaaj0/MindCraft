<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | MindCraft</title>

<!-- ==============================
 🎨 Fonts & Style
============================== -->
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">

<style>
/* ==============================
 🔧 Global Reset
============================== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ==============================
 🌈 Body Styling
============================== */
body {
  font-family: 'Baloo 2', cursive;
  min-height: 100vh;
  background: linear-gradient(to bottom, #8fe9ff, #c8f7b0);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* ✨ Background Glow Stars */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, #fff 2px, transparent 3px),
    radial-gradient(circle at 70% 20%, #fff 2px, transparent 3px),
    radial-gradient(circle at 40% 80%, #fff 2px, transparent 3px);
  opacity: 0.25;
  pointer-events: none;
}

/* ==============================
 🏠 Home & Back Buttons
============================== */
.home-wrap, 
.back-wrap {
  position: absolute;
  top: 24px;
  left: 24px;
  z-index: 10;
}

.home-btn, 
.back-btn {
  background: #ffae42;
  border: none;
  padding: 10px 18px;
  border-radius: 18px;
  font-size: 15px;
  font-weight: 700;
  color: #5a3a1a;
  cursor: pointer;
  box-shadow: 0 4px 0 #d8942f;
  transition: transform 0.2s ease;
}

.home-btn:hover, 
.back-btn:hover {
  transform: translateY(-1px);
}

.home-btn:active, 
.back-btn:active {
  transform: translateY(2px);
}

/* ==============================
 📦 Main Panel Container
============================== */
.panel {
  background: white;
  width: 400px;
  padding: 36px;
  border-radius: 26px;
  text-align: center;
  box-shadow: 0 14px 28px rgba(0, 0, 0, 0.2);
  position: relative;
  z-index: 1;
}

/* ==============================
 🧭 Typography
============================== */
.title {
  font-size: 38px;
  font-weight: 800;
  color: #5a3a1a;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 17px;
  color: #6d4c41;
  margin-bottom: 24px;
}

/* ==============================
 ✏️ Input Styling
============================== */
input {
  width: 100%;
  padding: 13px;
  border-radius: 14px;
  border: none;
  background: #f3f3f3;
  font-size: 15px;
  margin-bottom: 12px;
}

/* ==============================
 🔘 Button Styling
============================== */
button {
  width: 100%;
  background: #b8783d;
  color: white;
  border: none;
  border-radius: 18px;
  padding: 14px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 5px 0 #6b3e1a;
  transition: transform 0.15s ease;
}

button:hover {
  transform: translateY(-1px);
}

button:active {
  transform: translateY(3px);
}

.role-btn {
  margin-bottom: 12px;
}

/* ==============================
 🔗 Auth Links
============================== */
.auth-link {
  margin-top: 14px;
  font-size: 14px;
}

.auth-link a {
  color: #1db954;
  font-weight: 700;
  text-decoration: none;
}

/* ==============================
 ⚠️ Error & Message Text
============================== */
.message {
  margin-top: 10px;
  font-weight: 700;
  color: #c62828;
  font-size: 14px;
}

/* ==============================
 🍞 Toast Notification
============================== */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #1db954;
  color: white;
  padding: 14px 18px;
  border-radius: 14px;
  font-weight: 700;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
  z-index: 9999;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.toast.error {
  background: #c62828;
}

/* ==============================
 📱 Responsive Adjustments
============================== */
.student-form, 
.teacher-form {
  display: none;
}

.inner-btn {
  margin-bottom: 12px;
}

body.theme-dark {
  background: radial-gradient(circle at top right, #1a1a2e 0%, #0f2027 60%, #0b132b 100%);
}
body.theme-dark .panel {
  background: rgba(10, 15, 25, 0.72);
  border: 1px solid rgba(100,150,255,0.2);
  box-shadow: 0 0 20px rgba(80,150,255,0.35);
}
body.theme-dark .title,
body.theme-dark .subtitle,
/*body.theme-dark .auth-link,
body.theme-dark .auth-link a,*/
body.theme-dark .message {
  color: #f7ead7;
}
body.theme-dark input {
  background: rgba(255,255,255,0.12);
  color: #f7ead7;
}
body.theme-dark input::placeholder {
  color: rgba(247,234,215,0.7);
}
body.theme-dark button,
body.theme-dark .role-btn,
body.theme-dark .home-btn,
body.theme-dark .back-btn {
  background: linear-gradient(to bottom, #c9945a, #a67d4a);
  color: #fff;
  border: 2px solid #8a6a3a;
  box-shadow: 0 4px 0 #6b3e1a;
}
body.theme-dark .auth-link a {
  color: #9bd6ff;
}
</style>
</head>

<body>

<!-- ==============================
 🏠 Home Button
============================== -->
<div class="home-wrap">
  <button id="homeBtn" class="home-btn">Home</button>
</div>

<!-- ==============================
 ⬅️ Back Button
============================== -->
<div class="back-wrap" style="display:none;">
  <button id="backBtn" class="back-btn">Back</button>
</div>

<!-- ==============================
 🧩 Role Selection
============================== -->
<div class="panel" id="choiceSection">
  <div class="title">MindCraft</div>
  <div class="subtitle">Choose your role to sign in</div>

  <button class="role-btn" id="studentBtn">Student</button>
  <button class="role-btn" id="teacherBtn">Teacher</button>

  <div class="auth-link">
    Don’t have an account? <a href="signup.html">Sign up</a>
  </div>
</div>

<!-- ==============================
 🎓 Student Login Section
============================== -->
<div class="panel student-form" id="studentForm">
  <div class="title">Student Login</div>

  <form id="studentSigninForm">
    <input type="email" id="studentEmail" placeholder="Gmail address" required>
    <input type="password" id="studentPassword" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p class="message" id="studentMessage"></p>
  <button id="studentForgot" class="inner-btn">Forgot Password?</button>
</div>

<!-- ==============================
 🧑‍🏫 Teacher Login (Disabled)
============================== -->
<div class="panel teacher-form" id="teacherForm">
  <div class="title">Teacher Login</div>
  <div class="subtitle">DepEd email only</div>

  <form id="teacherSigninForm">
    <input type="email" id="teacherEmail" placeholder="DepEd email" required>
    <input type="password" id="teacherPassword" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p class="message" id="teacherMessage"></p>
  <button id="teacherForgot" class="inner-btn">Forgot Password?</button>
  <button id="resendTeacher" class="inner-btn" style="background:#ff69b4;">Resend Verification</button>
</div>

<!-- ==============================
 🍞 Toast Element
============================== -->
<div id="toast" class="toast"></div>

<!-- ==============================
 ⚙️ JavaScript Section
============================== -->
<script type="module">
/* Firebase Imports */
import { auth, db } from '../System/Database/firebase.js';
import { signInWithEmailAndPassword, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDoc, setDoc, doc, getDocs, query, where, deleteDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ==============================
 🔧 DOM Elements
============================== */
const studentBtn = document.getElementById("studentBtn");
const teacherBtn = document.getElementById("teacherBtn");
const choiceSection = document.getElementById("choiceSection");
const studentForm = document.getElementById("studentForm");
const teacherForm = document.getElementById("teacherForm");
const homeBtn = document.getElementById("homeBtn");
const backWrap = document.querySelector(".back-wrap");
const backBtn = document.getElementById("backBtn");
const studentMessage = document.getElementById("studentMessage");
const teacherMessage = document.getElementById("teacherMessage");

/* ==============================
 🍞 Toast Message Function
============================== */
function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError ? " error" : "");
  setTimeout(() => t.className = "toast", 3000);
}

/* ==============================
 🧑‍🎓 Show Student Login
============================== */
studentBtn.addEventListener("click", () => {
  choiceSection.style.display = "none";
  studentForm.style.display = "block";
  homeBtn.style.display = "none";
  backWrap.style.display = "block";
});

/* ==============================
 🚫 Disable Teacher Login (Coming Soon)
============================== */
teacherBtn.addEventListener("click", () => {
  showToast("Teacher login is not available yet.", true);

  // Uncomment below once Teacher feature is active:
  // choiceSection.style.display = "none";
  // teacherForm.style.display = "block";
  // homeBtn.style.display = "none";
  // backWrap.style.display = "block";
});

/* ==============================
 ⬅️ Back Button Logic
============================== */
backBtn.addEventListener("click", () => {
  studentForm.style.display = "none";
  teacherForm.style.display = "none";
  choiceSection.style.display = "block";
  homeBtn.style.display = "block";
  backWrap.style.display = "none";

  studentSigninForm.reset();
  teacherSigninForm.reset();
  studentMessage.textContent = "";
  teacherMessage.textContent = "";
});

/* ==============================
 🏠 Home Button Logic
============================== */
homeBtn.addEventListener("click", () => location.href='../../index.html');

/* ==============================
 🧮 Default Student Data Fields
============================== */
const defaultStudentFields = {
  level: 1,
  xp: 0,
  xpMax: 100,
  totalXP: 0,
  completedLessons: [],
  completedQuizzes: []
};

/* ==============================
 🧠 Student Sign-In Logic
============================== */
studentSigninForm.addEventListener("submit", async e => {
  e.preventDefault();
  const email = studentEmail.value.trim();
  const password = studentPassword.value;
  studentMessage.textContent = "";

  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    // 🔍 Verify email before allowing login
    if (!user.emailVerified) {
      studentMessage.textContent = "Please verify your email before signing in.";
      await signOut(auth);
      return;
    }

    // 🔗 Reference user data in Firestore
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    // 🧩 Recreate data if missing
    if (!snap.exists()) {
      await setDoc(ref, {
        name: user.displayName || user.email.split("@")[0],
        email: user.email,
        role: "student",
        verified: user.emailVerified,
        ...defaultStudentFields,
        createdAt: new Date()
      });
      console.log("✅ Firestore record recreated for missing student.");
    } else if (snap.data().role !== "student") {
      studentMessage.textContent = "This account is not a student.";
      await signOut(auth);
      return;
    }

    const data = (await getDoc(ref)).data();
    localStorage.setItem("currentUser", user.uid);
    localStorage.setItem("cachedName", data.name || "Student");
    localStorage.setItem("currentRole", "student");

    showToast("Login successful");
    setTimeout(() => location.href = "../Startup/StartupS.html", 1200);

  } catch (err) {
    console.error(err);
    showToast(err.message, true);
  }
});

/* ==============================
 🔑 Forgot Password (Student)
============================== */
studentForgot.addEventListener("click", async () => {
  const email = studentEmail.value.trim();
  if (!email) {
    showToast("Enter Gmail first.", true);
    return;
  }
  try {
    await sendPasswordResetEmail(auth, email);
    showToast("Password reset email sent.");
  } catch (err) {
    showToast(err.message, true);
  }
});

</script>
<script src="../Design/theme.js"></script>
<script>
(function(){
  function syncThemeClass(theme){
    document.body.classList.toggle("theme-dark", theme === "dark");
    document.body.classList.toggle("theme-light", theme !== "dark");
  }
  const saved = localStorage.getItem("theme") || "light";
  syncThemeClass(saved);
  if (typeof window.setTheme === "function") window.setTheme(saved);
  window.addEventListener("storage", (e)=>{ if (e.key === "theme") syncThemeClass(e.newValue || "light"); });
})();
</script>
</body>
</html>
