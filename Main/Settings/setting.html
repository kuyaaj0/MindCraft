<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MindCraft Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Baloo 2', sans-serif;
  background: linear-gradient(135deg, #a0ecff 0%, #c8f7b0 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  overflow-x: hidden;
  padding: 18px 12px 40px;
}
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.92);
  border-radius: 999px;
  opacity: 0.95;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  z-index: 1;
}
.cloud-1 { width: 220px; height: 80px; top: 6%; left: 4%; animation: float 6s ease-in-out infinite; }
.cloud-2 { width: 180px; height: 70px; top: 34%; right: 8%; animation: float 7s ease-in-out infinite 1s; }
.cloud-3 { width: 140px; height: 60px; top: 14%; right: 22%; animation: float 8s ease-in-out infinite 2s; }
.sun {
  position: absolute;
  width: 110px;
  height: 110px;
  background: radial-gradient(circle at 30% 30%, #fff9a8 0%, #fff07a 18%, #fff200 45%, #ffd800 100%);
  border-radius: 50%;
  top: 8%;
  right: 10%;
  box-shadow: 0 0 40px rgba(255,204,0,0.25);
  z-index: 1;
  animation: pulse 4s ease-in-out infinite;
}
.container {
  z-index: 10;
  width: 100%;
  max-width: 680px;
  padding: 26px;
  text-align: center;
  background: linear-gradient(to bottom right, rgba(255,255,255,0.95), rgba(244,255,250,0.9));
  border-radius: 18px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.12);
  border: 2px solid rgba(138,152,170,0.12);
  font-family: 'Press Start 2P', cursive;
}
.title { font-size: 1.15rem; color: #5a3a1a; margin-bottom: 10px; letter-spacing: 1px; }
.subtitle { font-size: 0.78rem; color: #2b2017; margin-bottom: 22px; font-weight: 700; }
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  align-items: center;
  margin-bottom: 14px;
}
.setting-label { text-align: left; padding-left: 8px; font-size: 0.62rem; color: #3b2e16; font-weight: 700; }
.setting-control { text-align: right; padding-right: 8px; }
select {
  min-width: 160px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 3px solid #8a6a3a;
  background: linear-gradient(to bottom, #d9a46a, #b68d5a);
  color: #2b2017;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Baloo 2', sans-serif;
  box-shadow: 0 6px 0 #7a5a3a;
  appearance: none;
}
select:focus { outline: none; transform: translateY(-1px); }
button[type="submit"] {
  margin-top: 12px;
  padding: 14px 22px;
  width: 100%;
  border-radius: 28px;
  border: none;
  background: linear-gradient(to bottom, #6aa84f, #4aa85a);
  color: #fff;
  font-weight: 800;
  font-size: 0.95rem;
  box-shadow: 0 8px 0 #3b6f36, 0 0 18px rgba(0,0,0,0.08);
  cursor: pointer;
}
#settingsFeedback { margin-top: 12px; min-height: 20px; font-size: 0.68rem; color: #10783a; font-weight: 700; }
.controls { display: flex; justify-content: center; margin-top: 18px; }
.btn-ghost {
  padding: 10px 16px;
  border-radius: 12px;
  border: 2px solid rgba(43,32,23,0.18);
  background: rgba(255,255,255,0.9);
  color: #5a3a1a;
  cursor: pointer;
  font-weight: 700;
  box-shadow: 0 6px 0 rgba(107,62,26,0.15);
}
.small-note { margin-top: 10px; font-size: 0.62rem; color: #3b2e16; opacity: 0.9; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

body.theme-dark .cloud {
  background: rgba(170, 190, 220, 0.35);
  box-shadow: 0 6px 20px rgba(30, 45, 70, 0.45);
  opacity: 0.8;
}
body.theme-dark .sun {
  background: radial-gradient(circle at 35% 35%, #c5d8ff 0%, #8fb2ff 35%, #5c84db 70%, #3a5fb3 100%);
  box-shadow: 0 0 35px rgba(95, 140, 230, 0.35);
}
body.theme-dark .title,
body.theme-dark .subtitle,
body.theme-dark .setting-label,
body.theme-dark .small-note,
body.theme-dark footer,
body.theme-dark #settingsFeedback {
  color: #9be7b3;
}
@media (max-width: 720px) {
  .settings-grid { grid-template-columns: 1fr; gap: 10px; }
  .container { padding: 20px; }
  .cloud-1 { left: 2%; width: 160px; height: 60px; top: 4%; }
  .cloud-2 { right: 6%; width: 130px; height: 54px; top: 34%; }
  .sun { right: 6%; top: 6%; width: 90px; height: 90px; }
}
</style>
</head>
<body>
<div class="cloud cloud-1" aria-hidden="true"></div>
<div class="cloud cloud-2" aria-hidden="true"></div>
<div class="cloud cloud-3" aria-hidden="true"></div>
<div class="sun" aria-hidden="true"></div>

<div class="container" role="region" aria-label="MindCraft Settings">
  <div class="title">MindCraft Settings</div>
  <div class="subtitle">Customize your experience — Theme, Sound, and Vibration</div>

  <form id="settingsForm" autocomplete="off" novalidate>
    <div class="settings-grid">
      <div class="setting-label">Theme</div>
      <div class="setting-control">
        <select id="themeSelect" name="theme" aria-label="Theme select">
          <option value="light">Light (default)</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <div class="setting-label">Sound</div>
      <div class="setting-control">
        <select id="soundSelect" name="sound" aria-label="Sound select">
          <option value="on">On</option>
          <option value="off">Off</option>
        </select>
      </div>

      <div class="setting-label">Vibration</div>
      <div class="setting-control">
        <select id="vibrationSelect" name="vibration" aria-label="Vibration select">
          <option value="on">On</option>
          <option value="off">Off</option>
        </select>
      </div>
    </div>

    <button type="submit" id="saveBtn">Save Settings</button>
    <div id="settingsFeedback" role="status" aria-live="polite"></div>
    <div class="small-note">Your choices are saved locally in your browser. Theme will apply immediately if available.</div>

    <div class="controls">
      <button type="button" class="btn-ghost" id="backBtn">⬅ Back</button>
    </div>
  </form>
</div>

<footer style="margin-top:18px; font-size:0.7rem; color:#3b2e16; opacity:0.85;">© 2025 MindCraft | Made by the team</footer>

<script>
(() => {
  const form = document.getElementById('settingsForm');
  const themeSelect = document.getElementById('themeSelect');
  const soundSelect = document.getElementById('soundSelect');
  const vibrationSelect = document.getElementById('vibrationSelect');
  const feedback = document.getElementById('settingsFeedback');
  const backBtn = document.getElementById('backBtn');

  const savedTheme = localStorage.getItem('theme') || 'light';

  const applyLocalThemeFallback = (theme) => {
    document.body.classList.toggle('theme-dark', theme === 'dark');
    document.body.classList.toggle('theme-light', theme !== 'dark');
  };
  const savedSound = localStorage.getItem('sound') || 'on';
  const savedVibration = localStorage.getItem('vibration') || 'on';

  themeSelect.value = savedTheme;
  soundSelect.value = savedSound;
  vibrationSelect.value = savedVibration;

  applyLocalThemeFallback(savedTheme);
  if (typeof window.setTheme === 'function') {
    try { window.setTheme(savedTheme); } catch (e) { console.warn(e); }
  }

  const showFeedback = (msg, isError = false) => {
    feedback.textContent = msg;
    feedback.style.color = isError ? '#c62828' : '#10783a';
    clearTimeout(showFeedback.t);
    showFeedback.t = setTimeout(() => { feedback.textContent = ''; }, 2500);
  };

  form.addEventListener('submit', (ev) => {
    ev.preventDefault();
    localStorage.setItem('theme', themeSelect.value);
    localStorage.setItem('sound', soundSelect.value);
    localStorage.setItem('vibration', vibrationSelect.value);

    applyLocalThemeFallback(themeSelect.value);
    if (typeof window.setTheme === 'function') {
      try { window.setTheme(themeSelect.value); } catch (e) { console.warn('setTheme failed', e); }
    }

    showFeedback('Settings saved!');
  });

  backBtn.addEventListener('click', () => {
    const role = localStorage.getItem('currentRole') || 'student';
    window.location.href = role === 'teacher' ? '../Webside/Teacher.html' : '../Webside/Student.html';
  });

  [themeSelect, soundSelect, vibrationSelect].forEach((el) => {
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') form.requestSubmit();
    });
  });
})();
</script>
<script src="../Design/theme.js"></script>
</body>
</html>
